<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>同意書管理システム</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
padding:20px;
max-width:1000px;
margin:auto;
}

h1{text-align:center;}

input,textarea,select,button{
width:100%;
padding:10px;
margin:5px 0 15px 0;
font-size:16px;
box-sizing:border-box;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

.card{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
font-size:14px;
}

.expired{background:#ffd6d6;}
.warn30{color:#caa400;font-weight:bold;}
.warn14{color:#ff8800;font-weight:bold;}
.warn7{color:red;font-weight:bold;}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
}

.day{
border:1px solid #ddd;
min-height:80px;
padding:4px;
font-size:11px;
background:white;
}

.flex-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

</style>

</head>

<body>

<h1>同意書管理システム</h1>

<div class="card">

<strong>今月更新</strong>
<div id="thisMonthSummary"></div>

<hr>

<strong>来月更新</strong>
<div id="nextMonthSummary"></div>

</div>


<div class="card">

<h3>検索</h3>

<input id="search" placeholder="患者検索">

<div class="flex-group">

<select id="sort">

<option value="expiry">期限順</option>
<option value="name">名前順</option>

</select>

<select id="filter">

<option value="all">すべて</option>
<option value="this">今月</option>
<option value="next">来月</option>

</select>

</div>

</div>


<div class="card">

<h3 id="formTitle">患者登録</h3>

<input type="hidden" id="editIndex">

<label>患者名</label>
<input id="name">

<label>同意日</label>
<input type="date" id="consent">

<label>初療日</label>
<input type="date" id="first">

<label>
<input type="checkbox" id="deform" style="width:auto">
変形徒手
</label>

<label>通知日数</label>
<input type="number" id="notice" value="7">

<label>メモ</label>
<textarea id="memo"></textarea>

<button onclick="save()">保存</button>

<button onclick="backupCSV()">CSV保存</button>

</div>


<div class="card">

<h3>患者一覧</h3>

<table>

<thead>
<tr>
<th>名前</th>
<th>期限</th>
<th>残日</th>
<th>操作</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>


<div class="card">

<h3>更新カレンダー</h3>

<h4 id="labelThis"></h4>
<div id="calendarThis" class="calendar-grid"></div>

<h4 id="labelNext"></h4>
<div id="calendarNext" class="calendar-grid"></div>

</div>


<script>

let patients=JSON.parse(localStorage.getItem("patients")||"[]")

function endOfMonth(d){
return new Date(d.getFullYear(),d.getMonth()+1,0)
}

function addMonths(d,m){
let n=new Date(d)
n.setMonth(n.getMonth()+m)
return n
}


function calculateExpiry(consent,first,deform,isEdit){

let base=(isEdit||!first)?new Date(consent):new Date(first)

if(deform){

let e=new Date(base)
e.setMonth(e.getMonth()+1)
e.setDate(e.getDate()-1)

return e

}

if(base.getDate()<=15){

return endOfMonth(addMonths(base,5))

}else{

return endOfMonth(addMonths(base,6))

}

}


function save(){

let idx=document.getElementById("editIndex").value

let name=document.getElementById("name").value
let consent=document.getElementById("consent").value
let first=document.getElementById("first").value
let deform=document.getElementById("deform").checked
let notice=document.getElementById("notice").value
let memo=document.getElementById("memo").value

if(!name||!consent){

alert("患者名と同意日は必須")
return

}

let isEdit=idx!==""

let expiry=calculateExpiry(consent,first,deform,isEdit)

let data={

id:isEdit?patients[idx].id:Date.now(),
name,
consent,
first,
deform,
notice,
memo,
expiry:expiry.toISOString()

}

if(isEdit){

patients[idx]=data

}else{

patients.push(data)

}

localStorage.setItem("patients",JSON.stringify(patients))

clearForm()

render()

}


function clearForm(){

editIndex.value=""
name.value=""
consent.value=""
first.value=""
deform.checked=false
notice.value=7
memo.value=""

}


function render(){

let tbody=document.getElementById("list")

tbody.innerHTML=""

let now=new Date()

now.setHours(0,0,0,0)

let thisY=now.getFullYear()
let thisM=now.getMonth()

let nextDate=new Date(thisY,thisM+1,1)

let nextY=nextDate.getFullYear()
let nextM=nextDate.getMonth()

labelThis.innerText=`${thisY}年${thisM+1}月`
labelNext.innerText=`${nextY}年${nextM+1}月`

thisMonthSummary.innerHTML=""
nextMonthSummary.innerHTML=""

let search=document.getElementById("search").value.toLowerCase()

let list=patients.filter(p=>(p.name+p.memo).toLowerCase().includes(search))

list.forEach(p=>{

let real=patients.indexOf(p)

let exp=new Date(p.expiry)

let diff=Math.ceil((exp-now)/(1000*60*60*24))

let warn=(diff<=7)?"warn7":(diff<=14)?"warn14":(diff<=30)?"warn30":""

let tr=document.createElement("tr")

if(diff<0)tr.classList.add("expired")

tr.innerHTML=`

<td><b>${p.name}</b>${p.deform?"<br><small>(変形)</small>":""}</td>

<td>${exp.toLocaleDateString()}</td>

<td class="${warn}">${diff<0?"期限切れ":diff+"日"}</td>

<td>

<button onclick="edit(${real})">編集</button>

<button onclick="del(${real})">削除</button>

<button onclick="addGoogle(${real})">Google</button>

</td>

`

tbody.appendChild(tr)

})

renderCalendar(thisY,thisM,"calendarThis")
renderCalendar(nextY,nextM,"calendarNext")

}


function renderCalendar(y,m,target){

let cal=document.getElementById(target)

cal.innerHTML=""

let first=new Date(y,m,1).getDay()

for(let i=0;i<first;i++){

let e=document.createElement("div")
e.className="day"

cal.appendChild(e)

}

let last=new Date(y,m+1,0).getDate()

for(let i=1;i<=last;i++){

let cell=document.createElement("div")

cell.className="day"

cell.innerHTML=`<b>${i}</b><br>`

patients.forEach(p=>{

let exp=new Date(p.expiry)

if(exp.getFullYear()==y && exp.getMonth()==m && exp.getDate()==i){

cell.innerHTML+=`<span style="color:red">●${p.name}</span><br>`

}

})

cal.appendChild(cell)

}

}


function edit(i){

let p=patients[i]

editIndex.value=i
name.value=p.name
consent.value=p.consent
first.value=p.first||""
deform.checked=p.deform
notice.value=p.notice
memo.value=p.memo

}


function del(i){

if(confirm("削除しますか？")){

patients.splice(i,1)

localStorage.setItem("patients",JSON.stringify(patients))

render()

}

}


function addGoogle(i){

let p=patients[i]

let exp=new Date(p.expiry)

let dateStr=exp.toISOString().split("T")[0].replace(/-/g,"")

let title=encodeURIComponent(p.name+" 同意書期限")

let url=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateStr}/${dateStr}`

window.open(url)

}


function backupCSV(){

let csv="\uFEFF名前,同意日,初療日,変形徒手,通知日数,期限,メモ\n"

patients.forEach(p=>{

let row=[

p.name,
p.consent,
p.first||"",
p.deform?"あり":"",
p.notice,
new Date(p.expiry).toLocaleDateString(),
p.memo.replace(/\n/g," ")

]

csv+=row.join(",")+"\n"

})

let blob=new Blob([csv],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download=`同意書バックアップ_${new Date().toISOString().split("T")[0]}.csv`

a.click()

}


search.oninput=render
sort.onchange=render
filter.onchange=render

render()

</script>

</body>
</html>
